<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="format-detection" content="telephone=no">
<title>Rovensky</title>
<link rel="icon" href="/favicon.ico?v=2" sizes="48x48">
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
<link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,300;9..144,1,300&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--paper:#F3EEE5;--ink:#1B1A17;--taupe:#8A8577;--line:rgba(27,26,23,.14);--serif:'Fraunces',Georgia,serif;--mono:'IBM Plex Mono',ui-monospace,monospace}
html,body{height:100%;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;justify-content:space-between;padding:32px 36px;min-height:100vh}
.frame{position:fixed;inset:0;border:10px solid var(--paper);pointer-events:none;z-index:10}
@media(max-width:600px){.frame{border-width:5px}body{padding:22px}}
.logo{display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--ink)}
.logo-box{width:40px;height:40px;border:1.4px solid var(--ink);display:grid;place-items:center;font-family:var(--serif);font-size:21px}
.logo-name{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;line-height:1.5}
main{flex:1;display:flex;justify-content:center;align-items:center}
blockquote{font-family:var(--serif);font-style:italic;font-weight:300;font-size:clamp(22px,3.5vw,52px);line-height:1.1;letter-spacing:-0.015em;white-space:nowrap}
footer{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;border-top:1px solid var(--line);padding-top:22px}
footer a{font-family:var(--mono);font-size:12px;letter-spacing:.1em;color:var(--taupe);text-decoration:none}
footer a:hover{color:var(--ink)}
footer span{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--taupe)}
.fade{opacity:0;transform:translateY(16px);transition:opacity 1s cubic-bezier(.2,.6,.2,1),transform 1s cubic-bezier(.2,.6,.2,1)}
.fade.on{opacity:1;transform:none}
.d1{transition-delay:.15s}.d2{transition-delay:.3s}
</style>
</head>
<body>
<div class="frame"></div>
<header class="fade on">
  <a class="logo" href="/"><div class="logo-box">R</div><span class="logo-name">Rovensky</span></a>
</header>
<main>
  <blockquote class="fade d1">"Stay Hungry. Stay Foolish."</blockquote>
</main>
<footer class="fade d2">
  <a href="mailto:michael@rovensky.ru">michael@rovensky.ru</a>
  <span>© 2026</span>
</footer>
<script>setTimeout(function(){document.querySelectorAll(".fade").forEach(function(el){el.classList.add("on")})},50)</script>
</body>
</html>
